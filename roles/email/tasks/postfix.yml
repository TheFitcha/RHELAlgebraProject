---
- name: Ensure postfix is installed on servera
  ansible.builtin.yum:
    name: postfix
    state: present

- name: Configure postfix parameters
  ansible.builtin.command:
    cmd: postconf -e "{{item.param}} = {{item.value}}"
  with_items: "{{postfix_params}}"

- name: Check postfix params validity
  ansible.builtin.command:
    cmd: postfix check -c /etc/postfix
  register: postfix_check_result

- name: Print postfix config check result
  ansible.builtin.debug:
    msg: "{{postfix_check_result}}"
  failed_when: postfix_check_result.failed == true

- name: Restart postfix service
  ansible.builtin.systemd:
    name: postfix
    state: restarted

- name: Create local mail folder for users
  ansible.builtin.file:
    path: "/home/{{item.username}}/{{home_mailbox}}"
    owner: "{{item.username}}"
    group: "{{item.group}}"
    mode: 0755
    state: directory
  with_items: "{{ all_users }}"

- name: Link local mailbox for users
  ansible.builtin.file:
    src: "/var/spool/mail/{{item.username}}"
    dest: "/home/{{item.username}}/{{home_mailbox}}/{{item.username}}"
    owner: "{{item.username}}"
    group: "{{item.group}}"
    mode: 0755
    state: link
  with_items: "{{ all_users }}"

- name: Install utils for sending mail
  ansible.builtin.yum:
    name: "{{item}}"
    state: present
  with_items: "{{ mail_packages }}"

- name: Send test message via mail command
  ansible.builtin.command:
    cmd: echo "test message" | mail -s test ops01@nexcore.local
  
- name: Check /var/spool/mail for test email
  ansible.builtin.command:
    cmd: cat /var/spool/mail/ops01
  register: spool_check_result

- name: Print spool check result
  ansible.builtin.debug:
    msg: "{{spool_check_result.stdout_lines}}"
    