---
- name: Create needed groups
  ansible.builtin.group:  
    name: "{{ item.group }}"
    state: present
  with_items: "{{ [sudo_users, regular_users] |
                  community.general.lists_mergeby('username') }}"

- name: Create users
  ansible.builtin.user:
    name: "{{item.username}}"
    groups: "{{item.group}}"
    create_home: true
    shell: /bin/bash
  with_items: "{{ [sudo_users, regular_users] |
                  community.general.lists_mergeby('username') }}"

- name: Setup OpenSSH
  import_tasks: openssh_config.yml

- name: Edit sudo access
  ansible.builtin.template:
    src: templates/sudoers.j2
    dest: /etc/sudoers.d/01-ansible-managed
