---
- name: Ensure autofs is installed
  ansible.builtin.yum:
    name: autofs
    state: present

- name: Deploy AutoFS configuration
  ansible.builtin.template:
    src: templates/autofs.master.j2
    dest: /etc/auto.master.d/ansible.autofs

- name: Deploy AutoFS mapping
  ansible.builtin.template:
    src: templates/autofs.home.j2
    dest: /etc/auto.home

- name: Ensure AutoFS service is enabled and restarted
  ansible.builtin.systemd:
    name: autofs
    state: restarted
    enabled: true
